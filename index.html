<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. LINEAR CIRCLES -->
    <div class="slider">
        <button class="arrow" id="down">↓</button>
        <div class="circles" id="circles"></div>
        <button class="arrow" id="up">↑</button>
    </div>

    <!-- 2. GRID OF CIRCLES -->
    <div id="grid"></div>

    <!-- 3. RANDOM CIRCLES -->
    <div id="box">
        <button id="refresh">↻</button>
    </div>

    <!-- 4. SCROLL PICKER -->
    <div id="picker">
        <div id="picker-list"></div>
        <div id="picker-track"><div id="picker-thumb"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
