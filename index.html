<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">

<body>

    <!-- linear circles -->
    <div class="slider">
        <button class="arrow" id="down">↓</button>
        <div class="circles" id="circles"></div>
        <button class="arrow" id="up">↑</button>
    </div>

    <!-- grid of circles-->
    <div id="grid"></div>

    <!-- random circles -->
    <div id="box">
        <button id="refresh">↻</button>
    </div>

    <!-- scroll picker -->
    <div id="picker">
        <div id="picker-list"></div>
        <div id="picker-track"><div id="picker-thumb"></div></div>
    </div>

    <!-- snake game -->
    <div class="snakegame">
        <div id="board"></div>
        <button id="snake-refresh">↻</button>
    </div>
